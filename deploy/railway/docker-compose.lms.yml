# ─────────────────────────────────────────────────────────────────────────────
# Local development compose for the NocoBase LMS
# Usage:
#   cp deploy/railway/.env.example .env   # fill in values
#   docker compose -f deploy/railway/docker-compose.lms.yml up
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nocobase_lms
      POSTGRES_USER: nocobase
      POSTGRES_PASSWORD: nocobase
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocobase -d nocobase_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../..          # repository root
      dockerfile: deploy/railway/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "13000:13000"
    volumes:
      - lms_storage:/app/storage
    environment:
      NODE_ENV: development
      APP_ENV: development
      APP_PORT: 13000
      APP_KEY: dev-secret-key-change-in-production
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: nocobase_lms
      DB_USER: nocobase
      DB_PASSWORD: nocobase
      STORAGE_PATH: /app/storage
      LOGGER_LEVEL: debug
      APPEND_PRESET_BUILT_IN_PLUGINS: "@nocobase/plugin-lms,@nocobase/plugin-auth-oidc"
      # Override with your Azure AD values for local SSO testing:
      # OIDC_CLIENT_ID:
      # OIDC_CLIENT_SECRET:
      # OIDC_TENANT_ID:

volumes:
  pg_data:
  lms_storage:
